# Yoke Configuration Example
# Copy this file to config.toml and edit for your environment

# Platform: "github" or "gitlab"
platform = "github"

# Repos to monitor — shared across all workflows
# Add all repositories where you want workflows to run
repos = [
    { owner = "mintybasil", repo = "yoke-workflows" },
]

# Named agent instances (Hermes API configs)
# Each step in a workflow references an agent by name
[[agents]]
name = "pm"
base_url = "http://localhost:8643"

[[agents]]
name = "swe"
base_url = "http://localhost:8644"

# Runtime settings
[runtime]
max_concurrent = 2          # max concurrent workflow runs (0 = unlimited)
workdir = "~/.yoke"         # runtime data directory
drain_timeout_secs = 600  # seconds to wait for in-flight workflows on shutdown (600 => 10mins)

# Server settings
[server]
host = "0.0.0.0"
port = 8644
webhook_host = "yoke.example.com"
max_body_size = 1048576   # 1MB default
catch_up_enabled = true           # replay missed webhook events on startup
catch_up_max_age_hours = 24       # max age of events to replay (hours)

# Required Environment Variables:
# - HERMES_API_KEY: Bearer token for Hermes REST API
# - WEBHOOK_SECRET: Webhook authentication key
# - GITHUB_TOKEN: GitHub auth for webhook management and git operations

# After configuring, register webhooks on your repositories:
#   yoke --config config.toml webhooks add --workflows .
#
# Verify webhooks were created:
#   yoke --config config.toml webhooks list
