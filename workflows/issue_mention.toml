[trigger]
type = "github_issue_comment_mention"
mentioned_user = "zeroklaw"
allowed_users = ["mintybasil"]

[git]
clone = false

[[steps]]
name = "Review and Respond"
agent = "swe"
prompt_template = """
You have been @ mentioned in a comment (id: {{comment_id}}) on issue #{{issue_number}} in {{owner}}/{{repo}}.

The comments says: {{comment_body}}

1. Review the entire issue thread to understand the context and identify where you are mentioned and what is being asked of you.
2. **Always** respond with a comment on the issue addressing what was asked of you.
3. If a code change is requested, optionally open a PR to address it.
"""
